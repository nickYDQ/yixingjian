<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智识长河 — 哲学 · 数理 · 生命 · 地球 · 智能</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c1018;
      --bg-panel: #141c28;
      --ink: #eae6de;
      --muted: #8899ad;
      --line: rgba(234, 230, 222, 0.1);
      --philosophy: #d4a574;
      --math: #5eb8c9;
      --physics: #d4b435;
      --chemistry: #6ebf8a;
      --biology: #e88888;
      --geology: #a89078;
      --ai: #b87fd9;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Spectral", Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      background-image:
        radial-gradient(ellipse 100% 70% at 0% 0%, rgba(94, 184, 201, 0.07), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 20%, rgba(184, 127, 217, 0.06), transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(212, 165, 116, 0.05), transparent 45%),
        linear-gradient(180deg, #080c12 0%, var(--bg) 40%);
    }

    header {
      padding: 1.5rem 1.25rem 0.5rem;
      max-width: 52rem;
      margin: 0 auto;
      text-align: center;
    }
    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.03em;
      margin: 0 0 0.5rem;
      background: linear-gradient(
        100deg,
        var(--philosophy),
        var(--math) 22%,
        var(--physics) 44%,
        var(--chemistry) 58%,
        var(--biology) 72%,
        var(--geology) 84%,
        var(--ai)
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.55;
      max-width: 36rem;
      margin: 0 auto;
      font-style: italic;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.35rem 0.5rem;
      padding: 1rem 1rem 0.75rem;
      max-width: 56rem;
      margin: 0 auto;
    }
    .tabs button {
      font-family: "Fraunces", Georgia, serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(20, 28, 40, 0.6);
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .tabs button:hover {
      color: var(--ink);
      border-color: rgba(234, 230, 222, 0.22);
    }
    .tabs button.active {
      color: var(--ink);
      border-color: currentColor;
      box-shadow: 0 0 20px color-mix(in srgb, currentColor 35%, transparent);
    }
    .tabs button[data-d="philosophy"].active { color: var(--philosophy); }
    .tabs button[data-d="math"].active { color: var(--math); }
    .tabs button[data-d="physics"].active { color: var(--physics); }
    .tabs button[data-d="chemistry"].active { color: var(--chemistry); }
    .tabs button[data-d="biology"].active { color: var(--biology); }
    .tabs button[data-d="geology"].active { color: var(--geology); }
    .tabs button[data-d="ai"].active { color: var(--ai); }

    .wrap {
      width: 100%;
      padding: 0 0.5rem 1.5rem;
    }

    .timeline-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      padding: 0.5rem 0 0.75rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-color: var(--muted) var(--bg-panel);
    }
    .timeline-inner {
      position: relative;
      padding: 0 1.5rem 0.75rem;
      margin: 0 auto;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      --ruler-tick-height: calc(1rem + 88px + 0.5rem);
    }
    .timeline-inner.wide { width: 3200px; }
    .timeline-inner.narrow { width: 2800px; }

    .timeline-ruler {
      position: relative;
      flex-shrink: 0;
      height: 40px;
      margin-top: 0.4rem;
    }
    .axis {
      position: absolute;
      left: 1.5rem;
      right: 1.5rem;
      top: 0;
      height: 2px;
      background: var(--line);
      pointer-events: none;
    }
    .axis::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(234, 230, 222, 0.05), transparent);
    }

    .year-ticks {
      position: absolute;
      left: 1.5rem;
      right: 1.5rem;
      top: 8px;
      height: 30px;
      pointer-events: none;
    }
    .year-tick {
      position: absolute;
      transform: translateX(-50%);
      font-family: "Fraunces", serif;
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
      top: 0;
      line-height: 1.2;
      max-width: 5.5rem;
      text-align: center;
    }
    .year-tick::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 100%;
      margin-bottom: 2px;
      width: 1px;
      height: var(--ruler-tick-height);
      background: var(--line);
      transform: translateX(-50%);
    }

    .tracks {
      position: relative;
      padding-top: 1rem;
      flex-shrink: 0;
    }
    .track {
      position: relative;
      margin-left: 0;
      height: 88px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--bg-panel), transparent 5%, transparent 95%, var(--bg-panel));
      border: 1px solid var(--line);
      overflow: visible;
    }
    .track { --accent: var(--math); --glow: color-mix(in srgb, var(--accent) 40%, transparent); }

    .marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      padding: 0;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
      z-index: 2;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 0 var(--glow);
    }
    .marker:hover, .marker:focus-visible, .marker.active {
      transform: translate(-50%, -50%) scale(1.22);
      box-shadow: 0 0 18px 4px var(--glow);
      outline: none;
    }
    .marker::after {
      content: attr(data-year);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      font-family: "Fraunces", serif;
      font-size: 0.55rem;
      color: var(--accent);
      white-space: nowrap;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
    }
    .marker:hover::after,
    .marker:focus-visible::after,
    .marker.active::after {
      opacity: 1;
    }
    .marker.label-below::after {
      bottom: auto;
      top: calc(100% + 6px);
    }

    .detail-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 48vh;
      background: var(--bg-panel);
      border-top: 1px solid var(--line);
      padding: 1rem 1.25rem 1.35rem;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 100;
      box-shadow: 0 -24px 48px rgba(0, 0, 0, 0.5);
    }
    .detail-panel.open { transform: translateY(0); }
    .detail-panel .inner { max-width: 720px; margin: 0 auto; }
    .detail-panel .disc {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.4rem;
      border: 1px solid color-mix(in srgb, currentColor 35%, transparent);
    }
    .detail-panel .disc.philosophy { color: var(--philosophy); background: color-mix(in srgb, var(--philosophy) 18%, transparent); }
    .detail-panel .disc.math { color: var(--math); background: color-mix(in srgb, var(--math) 18%, transparent); }
    .detail-panel .disc.physics { color: var(--physics); background: color-mix(in srgb, var(--physics) 18%, transparent); }
    .detail-panel .disc.chemistry { color: var(--chemistry); background: color-mix(in srgb, var(--chemistry) 18%, transparent); }
    .detail-panel .disc.biology { color: var(--biology); background: color-mix(in srgb, var(--biology) 18%, transparent); }
    .detail-panel .disc.geology { color: var(--geology); background: color-mix(in srgb, var(--geology) 18%, transparent); }
    .detail-panel .disc.ai { color: var(--ai); background: color-mix(in srgb, var(--ai) 18%, transparent); }
    .detail-panel h2 {
      font-family: "Fraunces", serif;
      font-size: 1.12rem;
      margin: 0 0 0.65rem;
      line-height: 1.38;
    }
    .detail-panel dl {
      margin: 0;
      display: grid;
      gap: 0.5rem;
    }
    .detail-panel dt {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .detail-panel dd {
      margin: 0.08rem 0 0;
      font-size: 0.88rem;
      line-height: 1.52;
    }
    .close-btn {
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.05rem;
      line-height: 1;
    }
    .close-btn:hover { border-color: var(--muted); }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      margin-top: 0.25rem;
      font-style: italic;
      padding: 0 1rem;
    }

    .geo-legend {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      max-width: 40rem;
      margin: 0 auto 0.5rem;
      line-height: 1.45;
    }

    @media (max-width: 640px) {
      .timeline-inner.wide { width: 2800px; }
      .timeline-inner.narrow { width: 2400px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>智识长河</h1>
    <p class="subtitle">以可交互时间线浏览哲学、数学、物理、化学、生物、地质年代与人工智能的主要节点；比例经过压缩与拉宽，便于阅读。悬停圆点见时间标签，点击展开详情。</p>
  </header>

  <nav class="tabs" id="tabs" aria-label="学科切换">
    <button type="button" data-d="philosophy" class="active">哲学</button>
    <button type="button" data-d="math">数学</button>
    <button type="button" data-d="physics">物理</button>
    <button type="button" data-d="chemistry">化学</button>
    <button type="button" data-d="biology">生物</button>
    <button type="button" data-d="geology">地质年代</button>
    <button type="button" data-d="ai">人工智能</button>
  </nav>

  <p class="geo-legend" id="geoNote" hidden>地质轴：左侧为地球早期，右侧为现今。显生宙占较宽画幅；冥古—太古宙高度压缩。</p>

  <div class="wrap">
    <div class="timeline-scroll" id="scroll">
      <div class="timeline-inner wide" id="inner">
        <div class="tracks" id="tracks"></div>
        <div class="timeline-ruler">
          <div class="axis"></div>
          <div class="year-ticks" id="ticks"></div>
        </div>
      </div>
    </div>
    <p class="hint" id="hint">横向滚动时间轴。近现代事件密集处已拉宽显示。</p>
  </div>

  <aside class="detail-panel" id="panel" aria-live="polite">
    <button type="button" class="close-btn" id="close" aria-label="关闭">×</button>
    <div class="inner" id="panelContent"></div>
  </aside>

  <script>
    const DISC = {
      philosophy: { label: "哲学", accent: "var(--philosophy)", className: "philosophy" },
      math: { label: "数学", accent: "var(--math)", className: "math" },
      physics: { label: "物理", accent: "var(--physics)", className: "physics" },
      chemistry: { label: "化学", accent: "var(--chemistry)", className: "chemistry" },
      biology: { label: "生物", accent: "var(--biology)", className: "biology" },
      geology: { label: "地质年代", accent: "var(--geology)", className: "geology" },
      ai: { label: "人工智能", accent: "var(--ai)", className: "ai" }
    };

    /** 人文与科学史：压缩古代，放宽近现代。近现代专用轴（如 AI）另算比例。 */
    function yearToPct(y, minY, maxY) {
      const yc = Math.min(maxY, Math.max(minY, y));
      if (minY >= 1600) {
        const mid = 1950;
        if (mid <= minY || maxY <= minY) {
          return ((yc - minY) / (maxY - minY)) * 100;
        }
        if (yc <= mid) {
          return ((yc - minY) / (mid - minY)) * 58;
        }
        return 58 + ((yc - mid) / (maxY - mid)) * 42;
      }
      if (yc <= 1000) {
        return ((yc - minY) / (1000 - minY)) * 20;
      }
      if (yc <= 1600) {
        return 20 + ((yc - 1000) / 600) * 12;
      }
      if (yc <= 1800) {
        return 32 + ((yc - 1600) / 200) * 10;
      }
      if (yc <= 1900) {
        return 42 + ((yc - 1800) / 100) * 11;
      }
      if (yc <= 1950) {
        return 53 + ((yc - 1900) / 50) * 13;
      }
      return 66 + ((yc - 1950) / (maxY - 1950)) * 34;
    }

    /**
     * 地质：ma = 百万年前。左端 4600 Ma，右端 0（今）。
     * 显生宙（541Ma 内）约占一半宽度；前寒武纪对数式压缩。
     */
    function maToPct(ma) {
      const m = Math.min(4600, Math.max(0, ma));
      if (m <= 541) {
        return 50 + (1 - m / 541) * 50;
      }
      if (m <= 2500) {
        return 25 + (1 - (m - 541) / (2500 - 541)) * 25;
      }
      return (1 - (m - 2500) / (4600 - 2500)) * 25;
    }

    const DATA = {
      philosophy: {
        kind: "year",
        minYear: -600,
        maxYear: 2025,
        innerClass: "narrow",
        ticks: [-600, -300, 0, 500, 1000, 1400, 1600, 1700, 1800, 1850, 1900, 1927, 1945, 1950, 2000, 2025],
        scrollRatio: 0.52,
        events: [
          { year: -585, person: "泰勒斯等（米利都学派）", event: "自然哲学的兴起", achievement: "以自然本身解释自然现象，被视为西方哲学与科学思想的共同源头之一。" },
          { year: -470, person: "苏格拉底（Socrates）", event: "诘问法与伦理探究", achievement: "将哲学焦点转向概念澄清与「认识你自己」，深刻影响柏拉图与整个欧陆传统。" },
          { year: -387, person: "柏拉图（Plato）", event: "学园与传统形而上学", achievement: "理念论、国家与灵魂学说；其对话体成为哲学教育的范本。" },
          { year: -335, person: "亚里士多德（Aristotle）", event: "逻辑学与多领域体系", achievement: "形式逻辑、形而上学、伦理学与博物学框架，中世纪与近代学术长期受其范畴支配。" },
          { year: 354, person: "奥古斯丁（Augustine）", event: "时间与神义问题", achievement: "内心转向、自由意志与恶的问题，融合希腊哲学与基督教神学。" },
          { year: 1250, person: "托马斯·阿奎那（Aquinas）", event: "经院哲学综合", achievement: "亚里士多德与基督教教义的系统结合，影响自然法与后世形而上学讨论。" },
          { year: 1641, person: "笛卡尔（Descartes）", event: "《第一哲学沉思》", achievement: "方法论怀疑与「我思」起点，开创近代主体性哲学与理性主义。" },
          { year: 1689, person: "洛克（Locke）", event: "经验论与政治哲学", achievement: "观念来源的经验说明；自然权利思想影响启蒙与宪政讨论。" },
          { year: 1781, person: "康德（Kant）", event: "《纯粹理性批判》", achievement: "先验观念论与认识论转向，划定理性边界并重塑伦理与美学的基础。" },
          { year: 1843, person: "克尔凯郭尔（Kierkegaard）", event: "《恐惧与颤栗》等", achievement: "提出「信仰之跃」与美学—伦理—宗教三阶段；强调个体在上帝面前的绝对责任，被视为基督教存在主义与实存哲学的先声。名言式命题：「真理即主体性」——真理不在体系而在个人决断中的承担。" },
          { year: 1872, person: "尼采（Nietzsche）", event: "《悲剧的诞生》", achievement: "以日神/酒神解释希腊悲剧精神，反对苏格拉底以降的理性乐观主义，为后来的价值重估与生命哲学埋伏笔。" },
          { year: 1882, person: "尼采（Nietzsche）", event: "《快乐的科学》与「上帝已死」", achievement: "第五卷补遗中借疯子之口宣告「上帝已死」：欧洲道德根基动摇，人须自铸价值。同一时期提出永恒轮回的思想实验，追问：若一切重演，你是否仍愿如此生活？" },
          { year: 1883, person: "尼采（Nietzsche）", event: "《查拉图斯特拉如是说》", achievement: "以诗性箴言体提出超人（Übermensch）、末人、权力意志；「成为你所是」与对怜悯伦理的批判，深刻影响文学、心理学与后现代伦理讨论。" },
          { year: 1887, person: "尼采（Nietzsche）", event: "《论道德的谱系》", achievement: "以系谱学方法区分主人道德与奴隶道德，揭示怨恨（ressentiment）如何翻转价值；为福柯等人的权力—知识分析提供方法论灵感。" },
          { year: 1900, person: "胡塞尔（Husserl）", event: "《逻辑研究》", achievement: "开创现象学：回到「事物本身」，通过本质直观与意向性分析描述意识结构。海德格尔、萨特等人的实存/生存论路径多由此出。" },
          { year: 1922, person: "维特根斯坦（Wittgenstein）", event: "《逻辑哲学论》", achievement: "语言界限与图像论，推动分析哲学与逻辑语义学发展。" },
          { year: 1927, person: "海德格尔（Heidegger）", event: "《存在与时间》", achievement: "以「此在」（Dasein）追问存在意义：操心、向死而在、本真与非本真；时间性为理解存在的境域。此书被视为20世纪欧陆哲学的里程碑，亦深刻影响萨特的存在主义表述。" },
          { year: 1942, person: "加缪（Camus）", event: "《西西弗神话》", achievement: "提出「荒谬」：人对意义的渴求与世界沉默之间的断裂；结论不是自杀而是「应当想象西西弗是快乐的」——在无神论下坚持反抗与清醒。与萨特论战「是否必为存在主义者」。" },
          { year: 1943, person: "萨特（Sartre）", event: "《存在与虚无》", achievement: "系统阐述自由与责任：意识是「自为存在」，不断否定既成所是；「人被判定为自由」。关键区分自在/自为、自欺（mauvaise foi）；他人即地狱指向主体间承认的困难。" },
          { year: 1946, person: "萨特（Sartre）", event: "公开演讲《存在主义是一种人道主义》", achievement: "面向公众的宣言：「存在先于本质」——人没有预先被规定的本质，通过选择与行动自我定义；强调人不能逃避对自我与他人的责任。此文通俗化存在主义，亦引发「是否仍人道主义」的哲学争议。" },
          { year: 1949, person: "波伏娃（de Beauvoir）", event: "《第二性》", achievement: "名言：「女人不是天生的，而是被塑造成的」；以存在主义伦理审视性别与处境，把「他者」分析引入女性主义经典，与萨特哲学形成对话与修正。" },
          { year: 1967, person: "福柯（Foucault）等", event: "知识考古与话语分析", achievement: "权力—知识关系与历史断裂视角，拓展哲学与社会理论的交叉。" }
        ]
      },
      math: {
        kind: "year",
        minYear: -500,
        maxYear: 2025,
        innerClass: "wide",
        ticks: [-500, 0, 500, 1000, 1500, 1600, 1700, 1800, 1900, 1920, 1950, 1970, 1990, 2000, 2010, 2025],

    const innerEl = document.getElementById("inner");
    const scrollEl = document.getElementById("scroll");
    const geoNote = document.getElementById("geoNote");
    const hintEl = document.getElementById("hint");

    function positionForEvent(e, cfg) {
      if (cfg.kind === "geo") {
        return maToPct(e.ma);
      }
      return yearToPct(e.year, cfg.minYear, cfg.maxYear);
    }

    function tickLabelYear(y, minY) {
      if (y < 0) return "前 " + Math.abs(y);
      if (y === 0) return "公元元年";
      return String(y);
    }

    function openPanel(ev, discKey) {
      const meta = DISC[discKey];
      document.querySelectorAll(".marker").forEach((x) => x.classList.remove("active"));
      const btn = [...document.querySelectorAll(".marker")].find(
        (b) => b.getAttribute("data-ev-id") === String(ev._id)
      );
      if (btn) btn.classList.add("active");

      let timeStr;
      if (DATA[discKey].kind === "geo") {
        if (ev.ma >= 1000) {
          timeStr = "约 " + (ev.ma / 1000).toFixed(2) + " 十亿年前（" + Math.round(ev.ma) + " Ma）";
        } else if (ev.ma >= 1) {
          timeStr = "约 " + Math.round(ev.ma * 10) / 10 + " 百万年前";
        } else {
          timeStr = "约 " + Math.round(ev.ma * 100) + " 万年前";
        }
      } else {
        const y = ev.year;
        timeStr = y < 0 ? "约公元前 " + Math.abs(y) + " 年" : y + " 年";
      }

      panelContent.innerHTML =
        '<span class="disc ' + meta.className + '">' + meta.label + "</span>" +
        "<h2>" + timeStr + " · " + ev.event + "</h2>" +
        "<dl>" +
        "<dt>代表人物 / 主体</dt><dd>" + ev.person + "</dd>" +
        "<dt>节点</dt><dd>" + ev.event + "</dd>" +
        "<dt>主要贡献与意义</dt><dd>" + ev.achievement + "</dd>" +
        "</dl>";
      panel.classList.add("open");
    }

    closeBtn.addEventListener("click", () => {
      panel.classList.remove("open");
      document.querySelectorAll(".marker").forEach((x) => x.classList.remove("active"));
    });

    panel.addEventListener("click", (e) => {
      if (e.target === panel) closeBtn.click();
    });

    function render(discKey) {
      currentDisc = discKey;
      const cfg = DATA[discKey];
      const meta = DISC[discKey];

      innerEl.classList.remove("wide", "narrow");
      innerEl.classList.add(cfg.innerClass || "wide");

      geoNote.hidden = cfg.kind !== "geo";
      hintEl.textContent =
        cfg.kind === "geo"
          ? "地质时间轴：越靠右越接近现代。点击圆点阅读各阶段地球与生命的协同演化。"
          : "横向滚动。古代压缩、近现代拉宽。悬停圆点显示时间，点击展开详情。";

      ticksEl.innerHTML = "";
      if (cfg.kind === "geo") {
        cfg.ticks.forEach((t) => {
          const el = document.createElement("div");
          el.className = "year-tick";
          el.style.left = maToPct(t.ma) + "%";
          el.textContent = t.label.replace(/\n/g, " ");
          ticksEl.appendChild(el);
        });
      } else {
        cfg.ticks.forEach((y) => {
          const el = document.createElement("div");
          el.className = "year-tick";
          el.style.left = yearToPct(y, cfg.minYear, cfg.maxYear) + "%";
          el.textContent = tickLabelYear(y, cfg.minYear);
          ticksEl.appendChild(el);
        });
      }

      tracksEl.innerHTML = "";
      const track = document.createElement("div");
      track.className = "track";
      track.style.setProperty("--accent", meta.accent);

      const list = cfg.events.map((e, i) => ({ ...e, _id: discKey + "-" + i }));
      list.sort((a, b) => {
        const pa = cfg.kind === "geo" ? a.ma : a.year;
        const pb = cfg.kind === "geo" ? b.ma : b.year;
        return pb - pa;
      });

      list.forEach((e, i) => {
        const m = document.createElement("button");
        m.type = "button";
        m.className = "marker" + (i % 2 === 1 ? " label-below" : "");
        m.style.left = positionForEvent(e, cfg) + "%";
        m.setAttribute("data-ev-id", e._id);
        if (cfg.kind === "geo") {
          let short =
            e.ma >= 1000
              ? (e.ma / 1000).toFixed(1) + " Ga"
              : e.ma >= 1
                ? Math.round(e.ma) + " Ma"
                : Math.round(e.ma * 1000) + " ka";
          m.dataset.year = short;
          m.title = short + " · " + e.event;
        } else {
          m.dataset.year = e.year < 0 ? "前" + Math.abs(e.year) : String(e.year);
          m.title = m.dataset.year + " · " + e.event;
        }
        m.setAttribute("aria-label", (cfg.kind === "geo" ? e.ma + " Ma" : e.year) + " · " + e.event);
        m.addEventListener("click", () => openPanel(e, discKey));
        track.appendChild(m);
      });

      tracksEl.appendChild(track);

      requestAnimationFrame(() => {
        const max = innerEl.scrollWidth - scrollEl.clientWidth;
        scrollEl.scrollLeft = Math.max(0, max * (cfg.scrollRatio ?? 0.5));
      });
    }

    document.getElementById("tabs").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-d]");
      if (!btn) return;
      document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      render(btn.getAttribute("data-d"));
    });

    render("philosophy");
  </script>
