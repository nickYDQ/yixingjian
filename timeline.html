<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <title>智识长河 — 哲学 · 数理 · 生命 · 地球 · 智能</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111520;
      --surface2: #181e2c;
      --ink: #f0ede6;
      --muted: #8694a8;
      --line: rgba(240, 237, 230, 0.08);
      --line2: rgba(240, 237, 230, 0.14);
      --philosophy: #d4a574;
      --math: #5eb8c9;
      --physics: #d4b435;
      --chemistry: #6ebf8a;
      --biology: #e88888;
      --geology: #a89078;
      --ai: #b87fd9;
      --accent: var(--philosophy);
      --font-d: "Outfit", "Noto Sans SC", system-ui, sans-serif;
      --font-b: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .page {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 860px) {
      .page { grid-template-columns: 1fr; }
    }

    /* ─── 左侧边栏 ─── */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    @media (max-width: 860px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        width: 280px;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
        box-shadow: 8px 0 32px rgba(0,0,0,0.5);
      }
      .sidebar.open { transform: translateX(0); }
    }

    .sidebar-head {
      padding: 1.5rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--line);
    }
    .sidebar-head h1 {
      font-family: var(--font-d);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin: 0 0 0.25rem;
      background: linear-gradient(100deg, var(--philosophy), var(--math) 30%, var(--physics) 55%, var(--ai));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sidebar-head p {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    .disc-list {
      list-style: none;
      margin: 0;
      padding: 0.65rem 0;
      flex: 1;
    }
    .disc-list li { margin: 0; }
    .disc-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-d);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }
    .disc-btn:hover { background: rgba(255,255,255,0.03); color: var(--ink); }
    .disc-btn.active { color: var(--ink); background: rgba(255,255,255,0.05); }
    .disc-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }
    .disc-btn[data-d="philosophy"] .disc-dot { background: var(--philosophy); color: var(--philosophy); }
    .disc-btn[data-d="math"] .disc-dot { background: var(--math); color: var(--math); }
    .disc-btn[data-d="physics"] .disc-dot { background: var(--physics); color: var(--physics); }
    .disc-btn[data-d="chemistry"] .disc-dot { background: var(--chemistry); color: var(--chemistry); }
    .disc-btn[data-d="biology"] .disc-dot { background: var(--biology); color: var(--biology); }
    .disc-btn[data-d="geology"] .disc-dot { background: var(--geology); color: var(--geology); }
    .disc-btn[data-d="ai"] .disc-dot { background: var(--ai); color: var(--ai); }
    .disc-btn.active .disc-dot { box-shadow: 0 0 14px currentColor; }

    .disc-count {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.7;
      font-weight: 400;
    }

    .sidebar-foot {
      padding: 0.85rem 1.25rem;
      border-top: 1px solid var(--line);
      font-size: 0.75rem;
    }
    .sidebar-foot a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .sidebar-foot a:hover { color: var(--ink); }

    /* 移动端顶栏 */
    .mobile-bar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 9;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0.65rem 1rem;
      align-items: center;
      gap: 0.75rem;
    }
    @media (max-width: 860px) {
      .mobile-bar { display: flex; }
    }
    .menu-btn {
      background: none;
      border: 1px solid var(--line2);
      color: var(--ink);
      width: 36px; height: 36px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mobile-bar h2 {
      font-family: var(--font-d);
      font-size: 0.92rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.04em;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9;
      background: rgba(0,0,0,0.5);
    }
    .overlay.show { display: block; }

    /* ─── 主区域：竖向时间线 ─── */
    .main {
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    .tl-header {
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 4vw, 3rem) clamp(1.5rem, 3vw, 2rem);
      border-bottom: 1px solid var(--line);
    }
    .tl-header h2 {
      font-family: var(--font-d);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: 0.06em;
    }
    .tl-header p {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0;
      max-width: 38rem;
      line-height: 1.6;
    }

    .tl-wrap {
      max-width: 50rem;
      margin: 0 auto;
      padding: 0 clamp(1.25rem, 4vw, 3rem);
    }

    /* 竖向时间线 */
    .tl {
      position: relative;
      padding: 2rem 0 2rem 2.75rem;
    }
    @media (min-width: 640px) {
      .tl { padding-left: 3.5rem; }
    }
    .tl::before {
      content: "";
      position: absolute;
      left: 0.85rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--line2) 3%, var(--line2) 97%, transparent);
    }
    @media (min-width: 640px) {
      .tl::before { left: 1.25rem; }
    }

    .tl-node {
      position: relative;
      margin-bottom: 0;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--line);
      animation: fadeUp 0.4s ease both;
    }
    .tl-node:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tl-dot {
      position: absolute;
      left: -1.9rem;
      top: 1.55rem;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 1px var(--line2), 0 0 12px color-mix(in srgb, var(--accent) 40%, transparent);
      z-index: 2;
    }
    @media (min-width: 640px) {
      .tl-dot { left: -2.25rem; }
    }

    .tl-year {
      font-family: var(--font-d);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
    }
    .tl-title {
      font-family: var(--font-d);
      font-size: clamp(1.05rem, 2.5vw, 1.2rem);
      font-weight: 700;
      margin: 0 0 0.15rem;
      letter-spacing: 0.02em;
    }
    .tl-person {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .tl-text {
      font-size: 0.92rem;
      color: color-mix(in srgb, var(--ink) 82%, var(--muted));
      line-height: 1.7;
      max-width: 42rem;
    }

    .tl-empty {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="page">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h1>智识长河</h1>
        <p>选择一门学科，纵览其思想脉络。</p>
      </div>
      <ul class="disc-list" id="discList"></ul>
      <div class="sidebar-foot">
        <a href="index.html">← 返回主页</a>
      </div>
    </aside>

    <div class="main" id="main">
      <div class="mobile-bar">
        <button class="menu-btn" id="menuBtn" aria-label="选择学科">☰</button>
        <h2 id="mobileTitle">哲学</h2>
      </div>

      <div class="tl-header" id="tlHeader">
        <h2 id="headerTitle">哲学</h2>
        <p id="headerDesc"></p>
      </div>

      <div class="tl-wrap">
        <div class="tl" id="timeline"></div>
      </div>
    </div>
  </div>

  <script>
    var DISC = {
      philosophy: { label: "哲学", color: "var(--philosophy)", desc: "从米利都学派到存在主义——人类追问根本问题的持续尝试。" },
      math:       { label: "数学", color: "var(--math)", desc: "从公理化几何到千禧难题——结构、量与无穷的严格语言。" },
      physics:    { label: "物理", color: "var(--physics)", desc: "从杠杆到引力波——用数学把自然写成可预言的方程。" },
      chemistry:  { label: "化学", color: "var(--chemistry)", desc: "从炼金术到分子机器——物质变换的规律与技艺。" },
      biology:    { label: "生物", color: "var(--biology)", desc: "从分类到基因编辑——理解生命运作与演化的历程。" },
      geology:    { label: "地质年代", color: "var(--geology)", desc: "46 亿年地球史——从行星吸积到智人登场的时间轴。" },
      ai:         { label: "人工智能", color: "var(--ai)", desc: "从图灵机到大语言模型——机器智能两百年进化。" }
    };

    var DATA = {
      philosophy: [
        { year: -585, person: "泰勒斯等（米利都学派）", event: "自然哲学的兴起", text: "以自然本身解释自然现象，被视为西方哲学与科学思想的共同源头之一。" },
        { year: -470, person: "苏格拉底（Socrates）", event: "诘问法与伦理探究", text: "将哲学焦点转向概念澄清与「认识你自己」，深刻影响柏拉图与整个欧陆传统。" },
        { year: -387, person: "柏拉图（Plato）", event: "学园与传统形而上学", text: "理念论、国家与灵魂学说；其对话体成为哲学教育的范本。" },
        { year: -335, person: "亚里士多德（Aristotle）", event: "逻辑学与多领域体系", text: "形式逻辑、形而上学、伦理学与博物学框架，中世纪与近代学术长期受其范畴支配。" },
        { year: 354, person: "奥古斯丁（Augustine）", event: "时间与神义问题", text: "内心转向、自由意志与恶的问题，融合希腊哲学与基督教神学。" },
        { year: 1250, person: "托马斯·阿奎那（Aquinas）", event: "经院哲学综合", text: "亚里士多德与基督教教义的系统结合，影响自然法与后世形而上学讨论。" },
        { year: 1641, person: "笛卡尔（Descartes）", event: "《第一哲学沉思》", text: "方法论怀疑与「我思」起点，开创近代主体性哲学与理性主义。" },
        { year: 1689, person: "洛克（Locke）", event: "经验论与政治哲学", text: "观念来源的经验说明；自然权利思想影响启蒙与宪政讨论。" },
        { year: 1781, person: "康德（Kant）", event: "《纯粹理性批判》", text: "先验观念论与认识论转向，划定理性边界并重塑伦理与美学的基础。" },
        { year: 1843, person: "克尔凯郭尔（Kierkegaard）", event: "《恐惧与颤栗》等", text: "提出「信仰之跃」与美学—伦理—宗教三阶段；强调个体在上帝面前的绝对责任，被视为基督教存在主义与实存哲学的先声。名言式命题：「真理即主体性」——真理不在体系而在个人决断中的承担。" },
        { year: 1872, person: "尼采（Nietzsche）", event: "《悲剧的诞生》", text: "以日神/酒神解释希腊悲剧精神，反对苏格拉底以降的理性乐观主义，为后来的价值重估与生命哲学埋伏笔。" },
        { year: 1882, person: "尼采（Nietzsche）", event: "《快乐的科学》与「上帝已死」", text: "第五卷补遗中借疯子之口宣告「上帝已死」：欧洲道德根基动摇，人须自铸价值。同一时期提出永恒轮回的思想实验，追问：若一切重演，你是否仍愿如此生活？" },
        { year: 1883, person: "尼采（Nietzsche）", event: "《查拉图斯特拉如是说》", text: "以诗性箴言体提出超人（Übermensch）、末人、权力意志；「成为你所是」与对怜悯伦理的批判，深刻影响文学、心理学与后现代伦理讨论。" },
        { year: 1887, person: "尼采（Nietzsche）", event: "《论道德的谱系》", text: "以系谱学方法区分主人道德与奴隶道德，揭示怨恨（ressentiment）如何翻转价值；为福柯等人的权力—知识分析提供方法论灵感。" },
        { year: 1900, person: "胡塞尔（Husserl）", event: "《逻辑研究》", text: "开创现象学：回到「事物本身」，通过本质直观与意向性分析描述意识结构。海德格尔、萨特等人的实存/生存论路径多由此出。" },
        { year: 1922, person: "维特根斯坦（Wittgenstein）", event: "《逻辑哲学论》", text: "语言界限与图像论，推动分析哲学与逻辑语义学发展。" },
        { year: 1927, person: "海德格尔（Heidegger）", event: "《存在与时间》", text: "以「此在」（Dasein）追问存在意义：操心、向死而在、本真与非本真；时间性为理解存在的境域。此书被视为 20 世纪欧陆哲学的里程碑，亦深刻影响萨特的存在主义表述。" },
        { year: 1942, person: "加缪（Camus）", event: "《西西弗神话》", text: "提出「荒谬」：人对意义的渴求与世界沉默之间的断裂；结论不是自杀而是「应当想象西西弗是快乐的」——在无神论下坚持反抗与清醒。与萨特论战「是否必为存在主义者」。" },
        { year: 1943, person: "萨特（Sartre）", event: "《存在与虚无》", text: "系统阐述自由与责任：意识是「自为存在」，不断否定既成所是；「人被判定为自由」。关键区分自在/自为、自欺（mauvaise foi）；他人即地狱指向主体间承认的困难。" },
        { year: 1946, person: "萨特（Sartre）", event: "《存在主义是一种人道主义》", text: "面向公众的宣言：「存在先于本质」——人没有预先被规定的本质，通过选择与行动自我定义；强调人不能逃避对自我与他人的责任。此文通俗化存在主义，亦引发「是否仍人道主义」的哲学争议。" },
        { year: 1949, person: "波伏娃（de Beauvoir）", event: "《第二性》", text: "名言：「女人不是天生的，而是被塑造成的」；以存在主义伦理审视性别与处境，把「他者」分析引入女性主义经典，与萨特哲学形成对话与修正。" },
        { year: 1967, person: "福柯（Foucault）等", event: "知识考古与话语分析", text: "权力—知识关系与历史断裂视角，拓展哲学与社会理论的交叉。" }
      ],
      math: [
        { year: -300, person: "欧几里得（Euclid）", event: "《几何原本》", text: "公理化几何典范，影响数学严格性标准两千余年。" },
        { year: 250, person: "丢番图（Diophantus）", event: "《算术》", text: "不定方程与代数思想，衔接古代算术与近代数论。" },
        { year: 820, person: "花拉子米（Al-Khwarizmi）", event: "代数学的系统阐述", text: "一次与二次方程算法化；algorithm 一词源于其名。" },
        { year: 1637, person: "笛卡尔（Descartes）", event: "解析几何", text: "坐标统一几何与代数，为微积分铺路。" },
        { year: 1684, person: "牛顿 / 莱布尼茨", event: "微积分发表", text: "变化率与累积的无穷小演算，成为科学建模核心语言。" },
        { year: 1820, person: "伽罗瓦（Galois）", event: "群论与根式可解性", text: "对称结构进入方程理论，开创抽象代数方向。" },
        { year: 1900, person: "希尔伯特（Hilbert）", event: "23 个数学问题", text: "为 20 世纪数学设定研究议程。" },
        { year: 1931, person: "哥德尔（Gödel）", event: "不完备定理", text: "形式系统内不可判定命题的存在，重塑数学基础观。" },
        { year: 1994, person: "怀尔斯（Wiles）等", event: "费马大定理", text: "椭圆曲线与模形式深度联系，数论里程碑。" },
        { year: 2003, person: "佩雷尔曼（Perelman）", event: "庞加莱猜想", text: "里奇流与三维拓扑，克雷研究所千禧难题之一获解。" }
      ],
      physics: [
        { year: -240, person: "阿基米德（Archimedes）", event: "浮力与杠杆", text: "静力学与流体静力学经典定律。" },
        { year: 1543, person: "哥白尼（Copernicus）", event: "日心说《天体运行论》", text: "宇宙图景从地心向日心转变的关键一步。" },
        { year: 1687, person: "牛顿（Newton）", event: "《自然哲学的数学原理》", text: "万有引力与运动定律，经典力学统一框架。" },
        { year: 1865, person: "麦克斯韦（Maxwell）", event: "麦克斯韦方程组", text: "电磁场统一，预言电磁波。" },
        { year: 1905, person: "爱因斯坦（Einstein）", event: "狭义相对论", text: "时空相对性与质能关系。" },
        { year: 1915, person: "爱因斯坦（Einstein）", event: "广义相对论", text: "引力几何化，宇宙学与引力波的理论基础。" },

    var listEl = document.getElementById("discList");
    var tlEl = document.getElementById("timeline");
    var headerTitle = document.getElementById("headerTitle");
    var headerDesc = document.getElementById("headerDesc");
    var mobileTitle = document.getElementById("mobileTitle");
    var sidebar = document.getElementById("sidebar");
    var overlay = document.getElementById("overlay");
    var menuBtn = document.getElementById("menuBtn");
    var current = "";

    Object.keys(DISC).forEach(function (key) {
      var d = DISC[key];
      var li = document.createElement("li");
      var btn = document.createElement("button");
      btn.className = "disc-btn";
      btn.setAttribute("data-d", key);
      btn.innerHTML = '<span class="disc-dot"></span>' + d.label + '<span class="disc-count">' + DATA[key].length + '</span>';
      btn.addEventListener("click", function () { render(key); closeSidebar(); });
      li.appendChild(btn);
      listEl.appendChild(li);
    });

    function closeSidebar() {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }

    menuBtn.addEventListener("click", function () {
      sidebar.classList.toggle("open");
      overlay.classList.toggle("show");
    });
    overlay.addEventListener("click", closeSidebar);

    function fmtYear(e) {
      if (e.geo) return e.geo;
      var y = e.year;
      if (y < 0) return "约公元前 " + Math.abs(y) + " 年";
      return y + " 年";
    }

    function render(key) {
      current = key;
      var d = DISC[key];
      var events = DATA[key];

      document.documentElement.style.setProperty("--accent", d.color);

      headerTitle.textContent = d.label;
      headerDesc.textContent = d.desc;
      mobileTitle.textContent = d.label;

      document.querySelectorAll(".disc-btn").forEach(function (b) {
        b.classList.toggle("active", b.getAttribute("data-d") === key);
      });

      var sorted = events.slice().sort(function (a, b) { return a.year - b.year; });

      tlEl.innerHTML = "";
      sorted.forEach(function (ev, i) {
        var node = document.createElement("article");
        node.className = "tl-node";
        node.style.animationDelay = (i * 0.04) + "s";
        node.innerHTML =
          '<div class="tl-dot"></div>' +
          '<div class="tl-year">' + fmtYear(ev) + '</div>' +
          '<h3 class="tl-title">' + ev.event + '</h3>' +
          '<p class="tl-person">' + ev.person + '</p>' +
          '<p class="tl-text">' + ev.text + '</p>';
        tlEl.appendChild(node);
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    render("philosophy");
